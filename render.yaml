# render.yaml — Render Blueprint (Infrastructure as Code)
#
# This file tells Render exactly how to deploy the FastAPI backend.
# When you connect this repo to Render, it reads this file automatically.
#
# Docs: https://render.com/docs/blueprint-spec

services:
  - type: web
    name: medicode-api
    runtime: python
    plan: free
    rootDir: backend # All commands run from the backend/ subfolder
    buildCommand: pip install -r requirements.txt
    # startCommand: runs migrations first (safe to run every deploy — Alembic is idempotent),
    # then starts the server. Render injects $PORT automatically.
    startCommand: alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: ALGORITHM
        value: HS256
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: 30
      - key: REFRESH_TOKEN_EXPIRE_DAYS
        value: 7
      - key: ENV
        value: production
      # The following must be set manually in the Render dashboard — never commit real values:
      - key: SECRET_KEY
        sync: false # Render will prompt you to fill this in
      - key: DATABASE_URL
        sync: false # Your Supabase connection string
      - key: ALLOWED_ORIGINS
        sync: false # e.g. https://medicode-institute.vercel.app
      - key: RESEND_API_KEY
        sync: false # Your Resend API key from https://resend.com/api-keys
      - key: EMAIL_FROM
        sync: false # e.g. MediCode Institute <onboarding@resend.dev>
      - key: FRONTEND_URL
        sync: false # Your Vercel frontend URL e.g. https://medicode-institute.vercel.app
